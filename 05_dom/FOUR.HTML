<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style = "font-size : 28px ; background-color : #212121;color : #fff">

    <ul class="language" style="color : black">
    <li>javascript</li>
    <li>nodelist</li>
    <li>htmlCollection</li>
    <li>Append method</li>
</ul>


    
</body>
<script>



function addlanguage(language){
    const li = document.createElement('li')
    // innerHtml traverse whole tree 
    li.innerHTML = `${language}`
    document.querySelector('.language').appendChild(li)

}


addlanguage('python')
addlanguage('typeScript')
addlanguage('Azure')

function addOptimize(language){
    const li = document.createElement('li')
  // appendchild() does not traverse whole tree
    li.appendChild(  document.createTextNode(language) )
    document.querySelector('.language').appendChild(li)

}

addOptimize('golang')


const lang = document.querySelector('li:nth-child(2)')

//lang.innerHTML = 'kiko'
       const newli =  document.createElement('li')
       newli.textContent = 'mojo'
       lang.replaceWith(newli)


// remove an element

const lastlang = document.querySelector('li:last-child')
lastlang.remove()





const ullist = document.querySelectorAll('.language')
console.log(ullist)

Array.from(ullist)
ullist.forEach(function (li){
    li.style.backgroundColor = 'pink'
})

</script>



</html>
